name: TrustMCP
description: GitHub Action for static security scanning of JavaScript/TypeScript Model Context Protocol (MCP) server repositories, with JSON, Markdown, and SARIF output.

outputs:
  finding-count:
    description: Total findings reported by TrustMCP.
    value: ${{ steps.scan.outputs.finding-count }}
  rule-count:
    description: Count of unique rules triggered across all findings.
    value: ${{ steps.scan.outputs.rule-count }}
  low-count:
    description: Count of low-severity findings.
    value: ${{ steps.scan.outputs.low-count }}
  medium-count:
    description: Count of medium-severity findings.
    value: ${{ steps.scan.outputs.medium-count }}
  high-count:
    description: Count of high-severity findings.
    value: ${{ steps.scan.outputs.high-count }}
  new-finding-count:
    description: Count of findings that are not present in the supplied baseline.
    value: ${{ steps.scan.outputs.new-finding-count }}
  new-rule-count:
    description: Count of unique rules triggered by findings not present in the supplied baseline.
    value: ${{ steps.scan.outputs.new-rule-count }}
  new-low-count:
    description: Count of new low-severity findings after baseline filtering.
    value: ${{ steps.scan.outputs.new-low-count }}
  new-medium-count:
    description: Count of new medium-severity findings after baseline filtering.
    value: ${{ steps.scan.outputs.new-medium-count }}
  new-high-count:
    description: Count of new high-severity findings after baseline filtering.
    value: ${{ steps.scan.outputs.new-high-count }}
  baseline-applied:
    description: Whether the action loaded at least one baseline entry for this scan.
    value: ${{ steps.scan.outputs.baseline-applied }}
  summary-message:
    description: Single-line summary text for the completed scan.
    value: ${{ steps.scan.outputs.summary-message }}

inputs:
  target:
    description: Local folder, gh:owner/repo shorthand, or public GitHub repository URL to scan. Defaults to the checked-out workspace.
    required: false
    default: ""
  format:
    description: Report output format (text, json, markdown, or sarif).
    required: false
    default: ""
  fail-on:
    description: Exit non-zero when a finding at or above this severity exists.
    required: false
    default: ""
  output-file:
    description: Optional file path for writing the selected rendered report.
    required: false
    default: ""
  baseline-output:
    description: Optional file path for writing the current findings as a reusable baseline JSON file.
    required: false
    default: ""
  config-file:
    description: Optional path to a `trustmcp.config.json` in the scanned workspace.
    required: false
    default: ""
  baseline-file:
    description: Optional path to a JSON baseline file listing known findings (ruleId, file, line).
    required: false
    default: ""
  summary-only:
    description: Optional true/false override for compact summary-only output (empty to let config-file defaults apply).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Resolve action inputs
      id: resolve
      shell: bash
      env:
          INPUT_TARGET: ${{ inputs.target }}
          INPUT_FORMAT: ${{ inputs.format }}
          INPUT_FAIL_ON: ${{ inputs.fail-on }}
          INPUT_OUTPUT_FILE: ${{ inputs.output-file }}
          INPUT_BASELINE_OUTPUT: ${{ inputs.baseline-output }}
          INPUT_CONFIG_FILE: ${{ inputs.config-file }}
          INPUT_SUMMARY_ONLY: ${{ inputs.summary-only }}
          INPUT_BASELINE_FILE: ${{ inputs.baseline-file }}
      run: |
        set -euo pipefail
        target="$INPUT_TARGET"
        output_file="$INPUT_OUTPUT_FILE"
        baseline_output="$INPUT_BASELINE_OUTPUT"
        config_file="$INPUT_CONFIG_FILE"
        summary_only="$INPUT_SUMMARY_ONLY"
        baseline_file="$INPUT_BASELINE_FILE"

        if [ -z "$target" ]; then
          target="$GITHUB_WORKSPACE"
        fi

        if [ -n "$output_file" ]; then
          case "$output_file" in
            /*) ;;
            *) output_file="$GITHUB_WORKSPACE/$output_file" ;;
          esac

          output_dir=$(dirname "$output_file")
          if [ ! -d "$output_dir" ]; then
            printf '%s\n' "TrustMCP action error: output-file directory does not exist: $output_dir" >&2
            exit 1
          fi
        fi

        if [ -n "$baseline_output" ]; then
          case "$baseline_output" in
            /*) ;;
            *) baseline_output="$GITHUB_WORKSPACE/$baseline_output" ;;
          esac

          baseline_output_dir=$(dirname "$baseline_output")
          if [ ! -d "$baseline_output_dir" ]; then
            printf '%s\n' "TrustMCP action error: baseline-output directory does not exist: $baseline_output_dir" >&2
            exit 1
          fi
        fi

        if [ -n "$INPUT_FORMAT" ]; then
          case "$INPUT_FORMAT" in
            text|json|markdown|sarif) ;;
            *)
              printf '%s\n' "TrustMCP action error: format must be 'text', 'json', 'markdown', or 'sarif'." >&2
              exit 1
              ;;
          esac
        fi

        if [ -n "$INPUT_FAIL_ON" ]; then
          case "$INPUT_FAIL_ON" in
            low|medium|high) ;;
            *)
              printf '%s\n' "TrustMCP action error: fail-on must be 'low', 'medium', or 'high'." >&2
              exit 1
              ;;
          esac
        fi

        if [ -n "$summary_only" ]; then
          case "$summary_only" in
            true|false) ;;
            *)
              printf '%s\n' "TrustMCP action error: summary-only must be 'true' or 'false' when provided." >&2
              exit 1
              ;;
          esac
        fi

        case "$target" in
          gh:*|http://*|https://*) ;;
          *)
            if [ ! -e "$target" ]; then
              printf '%s\n' "TrustMCP action error: target does not exist: $target" >&2
              exit 1
            fi
            ;;
        esac

        if [ -n "$config_file" ]; then
          case "$config_file" in
            /*) ;;
            *) config_file="$GITHUB_WORKSPACE/$config_file" ;;
          esac

          if [ ! -e "$config_file" ]; then
            printf '%s\n' "TrustMCP action error: config-file does not exist: $config_file" >&2
            exit 1
          fi
        fi

        if [ -n "$baseline_file" ]; then
          case "$baseline_file" in
            /*) ;;
            *) baseline_file="$GITHUB_WORKSPACE/$baseline_file" ;;
          esac

          if [ ! -e "$baseline_file" ]; then
            printf '%s\n' "TrustMCP action error: baseline-file does not exist: $baseline_file" >&2
            exit 1
          fi
        fi

        printf 'target=%s\n' "$target" >> "$GITHUB_OUTPUT"
        printf 'format=%s\n' "$INPUT_FORMAT" >> "$GITHUB_OUTPUT"
        printf 'output-file=%s\n' "$output_file" >> "$GITHUB_OUTPUT"
        printf 'baseline-output=%s\n' "$baseline_output" >> "$GITHUB_OUTPUT"
        printf 'config-file=%s\n' "$config_file" >> "$GITHUB_OUTPUT"
        printf 'summary-only=%s\n' "$summary_only" >> "$GITHUB_OUTPUT"
        printf 'baseline-file=%s\n' "$baseline_file" >> "$GITHUB_OUTPUT"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci

    - name: Build TrustMCP
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm run build

    - name: Run TrustMCP scan
      id: scan
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        TARGET: ${{ steps.resolve.outputs.target }}
        FORMAT: ${{ steps.resolve.outputs.format }}
        FAIL_ON: ${{ inputs.fail-on }}
        OUTPUT_FILE: ${{ steps.resolve.outputs.output-file }}
        BASELINE_OUTPUT: ${{ steps.resolve.outputs.baseline-output }}
        CONFIG_FILE: ${{ steps.resolve.outputs.config-file }}
        SUMMARY_ONLY: ${{ steps.resolve.outputs.summary-only }}
        BASELINE_FILE: ${{ steps.resolve.outputs.baseline-file }}
      run: |
        set -euo pipefail
        node dist/action/main.js "$TARGET" "$FORMAT" "$FAIL_ON" "$OUTPUT_FILE" "$BASELINE_OUTPUT" "$CONFIG_FILE" "$SUMMARY_ONLY" "$BASELINE_FILE"
