name: TrustMCP gate

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  trustmcp:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository under test
        uses: actions/checkout@v4

      - name: Check out TrustMCP
        uses: actions/checkout@v4
        with:
          repository: Gujiassh/trustmcp
          path: _trustmcp

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: _trustmcp/package-lock.json

      - name: Install TrustMCP dependencies
        run: npm ci
        working-directory: _trustmcp

      - name: Build TrustMCP
        run: npm run build
        working-directory: _trustmcp

      - name: Scan checked-out repository
        run: node dist/cli/main.js "$GITHUB_WORKSPACE" --format json --fail-on high
        working-directory: _trustmcp
