name: TrustMCP gate

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  trustmcp:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository under test
        uses: actions/checkout@v4

      - name: Run TrustMCP gate
        uses: Gujiassh/trustmcp@v0.1.0
        with:
          target: ${{ github.workspace }}
          format: json
          fail-on: high
