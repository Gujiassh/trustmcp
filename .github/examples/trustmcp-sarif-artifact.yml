name: TrustMCP SARIF artifact

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trustmcp:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: mkdir -p reports

      - id: trustmcp
        uses: Gujiassh/trustmcp@v0.1.0
        with:
          target: ${{ github.workspace }}
          format: sarif
          fail-on: high
          output-file: reports/trustmcp.sarif

      - uses: actions/upload-artifact@v4
        with:
          name: trustmcp-sarif
          path: reports/trustmcp.sarif
