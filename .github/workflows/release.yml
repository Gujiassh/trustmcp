name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Git tag and release version, for example v0.1.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Validate release request
        env:
          INPUT_VERSION: ${{ inputs.version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          CURRENT_REF_NAME: ${{ github.ref_name }}
          CURRENT_REF_TYPE: ${{ github.ref_type }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ ! "$INPUT_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            printf '%s\n' "Release version must match v<major>.<minor>.<patch>, for example v0.1.1." >&2
            exit 1
          fi

          if [[ "$CURRENT_REF_TYPE" != "branch" || "$CURRENT_REF_NAME" != "$DEFAULT_BRANCH" ]]; then
            printf '%s\n' "Run the release workflow from the default branch: $DEFAULT_BRANCH." >&2
            exit 1
          fi

          package_version="$(node -p "require('./package.json').version")"
          if [[ "v$package_version" != "$INPUT_VERSION" ]]; then
            printf '%s\n' "package.json version ($package_version) does not match requested release ($INPUT_VERSION)." >&2
            exit 1
          fi

          if git rev-parse "$INPUT_VERSION" >/dev/null 2>&1; then
            printf '%s\n' "Git tag already exists: $INPUT_VERSION" >&2
            exit 1
          fi

          if gh release view "$INPUT_VERSION" >/dev/null 2>&1; then
            printf '%s\n' "GitHub release already exists: $INPUT_VERSION" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run local release checks
        run: npm run publish:check

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
          TARGET_SHA: ${{ github.sha }}
        run: gh release create "$INPUT_VERSION" --target "$TARGET_SHA" --title "$INPUT_VERSION" --generate-notes
